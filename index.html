<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FANTA ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    background:#000;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQg84QY2_xsWTQVDW2OJwfIl_Y8tXsGvrFKEw&s');
    background-size:cover;
    background-position:center;
    filter:blur(8px);
    transform:scale(1.1);
}

.box{
    position:relative;
    z-index:2;
    width:330px;
    padding:25px;
    border-radius:20px;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(6px);
    color:white;
}

.logo{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#ffcc00;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-bottom:12px;
    outline:none;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    font-size:15px;
}

#painel{
    display:none;
}

.menu{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.menu button{
    margin-top:0;
}

.area{
    display:none;
}

.ativo{
    display:block;
}

.keyItem{
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.keyText{
    font-size:14px;
}

.deleteBtn{
    background:red;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

#novaKey{
    margin-top:15px;
    text-align:center;
    font-size:18px;
    color:#00ff88;
    word-break:break-all;
}

</style>
</head>
<body>

<div class="box">

    <div class="logo">FANTA ADMIN</div>

    <!-- LOGIN -->

    <div id="login">

        <input type="text"
        id="user"
        placeholder="Usuário">

        <input type="password"
        id="senha"
        placeholder="Senha">

        <button onclick="logar()">
            ENTRAR
        </button>

    </div>

    <!-- PAINEL -->

    <div id="painel">

        <div class="menu">

            <button onclick="abrir('gerar')">
                GERAR
            </button>

            <button onclick="abrir('keys')">
                KEYS
            </button>

        </div>

        <!-- GERAR KEY -->

        <div id="gerar" class="area ativo">

            <button onclick="gerarKey()">
                GERAR NOVA KEY
            </button>

            <div id="novaKey"></div>

        </div>

        <!-- LISTA -->

        <div id="keys" class="area">

            <div id="listaKeys"></div>

        </div>

    </div>

</div>

<script>

const SUPABASE_URL =
"https://oalyokjoixouwywxfmtz.supabase.co";

const SUPABASE_KEY =
"sb_publishable_kg2nublKacXnCFQWQaA0QA_jv1C_-Hp";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

function logar(){

    const user =
    document.getElementById("user").value;

    const senha =
    document.getElementById("senha").value;

    if(user === "gbz" && senha === "123"){

        document.getElementById("login")
        .style.display = "none";

        document.getElementById("painel")
        .style.display = "block";

        carregarKeys();

    }else{

        alert("Login inválido");

    }

}

function abrir(id){

    document.querySelectorAll(".area")
    .forEach(area => {

        area.classList.remove("ativo");

    });

    document.getElementById(id)
    .classList.add("ativo");

}

function criarKey(){

    const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let key = "FANTA-";

    for(let i = 0; i < 8; i++){

        key += chars.charAt(
            Math.floor(Math.random() * chars.length)
        );

    }

    return key;
}

async function gerarKey(){

    const novaKey = criarKey();

    const { error } = await supabaseClient
    .from("keys")
    .insert([
        {
            key: novaKey,
            usada: false
        }
    ]);

    if(error){

        alert("Erro ao salvar");
        console.log(error);
        return;

    }

    document.getElementById("novaKey")
    .innerHTML = novaKey;

    carregarKeys();

}

async function carregarKeys(){

    const { data, error } = await supabaseClient
    .from("keys")
    .select("*")
    .order("id", { ascending:false });

    if(error){
        return;
    }

    let html = "";

    data.forEach(item => {

        html += `
        
        <div class="keyItem">

            <div class="keyText">
                ${item.key}
            </div>

            <button class="deleteBtn"
            onclick="deletarKey(${item.id})">

                X

            </button>

        </div>

        `;

    });

    document.getElementById("listaKeys")
    .innerHTML = html;

}

async function deletarKey(id){

    await supabaseClient
    .from("keys")
    .delete()
    .eq("id", id);

    carregarKeys();

}

</script>

</body>
</html>
